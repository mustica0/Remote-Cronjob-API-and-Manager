<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Cronjob Manager</title>
    <style>
        /* Tasarım Standartları: Modern, Canlı Renkler (Vibrant) ve Responsive Yapı */
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --success: #10B981;
            --danger: #EF4444;
            --dark: #1E293B;
            --bg: #F8FAFC;
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg); 
            color: var(--dark); 
            margin: 0; 
            padding: 20px; 
        }

        .container { max-width: 1000px; margin: 0 auto; }
        
        h1 { 
            text-align: center; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Responsive Grid Tasarımı */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
            margin-top: 30px; 
        }

        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            transition: transform 0.3s ease;
            border-top: 4px solid var(--primary);
        }

        .card:hover { transform: translateY(-5px); }

        .status-dot { 
            display: inline-block; 
            width: 12px; 
            height: 12px; 
            border-radius: 50%; 
            background-color: var(--success); 
            margin-right: 8px;
            box-shadow: 0 0 8px var(--success);
        }

        .btn { 
            background: linear-gradient(135deg, #4F46E5 0%, #3B82F6 100%); 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            transition: opacity 0.2s; 
            margin-top: 15px;
        }

        .btn:hover { opacity: 0.9; }
        
        #log-screen {
            background: #0F172A;
            color: #38BDF8;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9em;
            height: 100px;
            overflow-y: auto;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Remote Cronjob API Manager</h1>
        
        <div class="grid">
            <div class="card">
                <h3>Sistem Durumu</h3>
                <p><span class="status-dot" id="sys-status"></span> <strong id="status-text">Sistem Çevrimiçi</strong></p>
                <p>Aktif Worker: <strong>3</strong></p>
                <p>Bekleyen Görev: <strong>12</strong></p>
            </div>

            <div class="card">
                <h3>Otomasyon Yetenekleri</h3>
                <p>Auto-Test mekanizması ile API uç noktalarını ve worker sağlık durumlarını test edin.</p>
                <button class="btn" onclick="runSelfCheck()">Self-Check Başlat (Auto Test)</button>
            </div>
        </div>

        <div class="card" style="margin-top: 20px; border-top-color: var(--dark);">
            <h3>Sistem Logları (Auto Control)</h3>
            <div id="log-screen">
                > Sistem başlatıldı...<br>
                > Port 8080 dinleniyor...<br>
            </div>
        </div>
    </div>

    <script>
        // Auto Control ve Self-Check Mantığı (JavaScript)
        function addLog(message) {
            const logScreen = document.getElementById('log-screen');
            logScreen.innerHTML += `> ${message}<br>`;
            logScreen.scrollTop = logScreen.scrollHeight; // Otomatik aşağı kaydır
        }

        function runSelfCheck() {
            addLog("Auto-Test başlatılıyor...");
            const btn = document.querySelector('.btn');
            btn.disabled = true;
            btn.innerText = "Test Ediliyor...";

            // API kontrol simülasyonu
            setTimeout(() => {
                addLog("Modül 1: Veritabanı bağlantısı başarılı [OK]");
            }, 800);

            setTimeout(() => {
                addLog("Modül 2: Worker Node'lar yanıt veriyor [OK]");
            }, 1600);

            setTimeout(() => {
                addLog("Sonuç: Self-Check testleri %100 başarıyla tamamlandı.");
                btn.disabled = false;
                btn.innerText = "Self-Check Başlat (Auto Test)";
                btn.style.background = "linear-gradient(135deg, #10B981 0%, #059669 100%)";
            }, 2500);
        }
    </script>
</body>
</html>
